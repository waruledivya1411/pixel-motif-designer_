name: pixel_motif_designer
description: A production-quality pixel motif design application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management — lightweight, interview-friendly, and sufficient for this app.
  provider: ^6.1.5

  # SVG rendering for motif import/export workflows.
  flutter_svg: ^2.2.0

  # Local filesystem paths for saving motif files and exports.
  path_provider: ^2.1.5

  # Saves exported images to the device gallery (actively maintained alternative).
  gal: ^2.3.2

  # Runtime permission requests for gallery and storage access.
  permission_handler: ^12.0.1

  # Captures widget snapshots for PNG export.
  screenshot: ^3.0.0

  # Parses and generates SVG/XML motif data.
  xml: ^6.5.0

  # Shares SVG files so users can save to Downloads/Files on mobile.
  share_plus: ^12.0.1

  # Persists appearance (theme mode) across app restarts.
  shared_preferences: ^2.5.3

  # Keeps native splash visible until Flutter first frame (launch polish).
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#E1E8F2"
  color_dark: "#0F1218"
  android_12:
    color: "#E1E8F2"
    color_dark: "#0F1218"
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  # Dark backdrop matches the logo frame; inset keeps artwork inside OS masks.
  adaptive_icon_background: "#1A1A1F"
  adaptive_icon_foreground: assets/icon/app_icon.png
  adaptive_icon_foreground_inset: 8
  web:
    generate: true
    image_path: assets/icon/app_icon.png
  windows:
    generate: true
    image_path: assets/icon/app_icon.png
  macos:
    generate: true
    image_path: assets/icon/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
